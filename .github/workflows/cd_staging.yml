name: Deploy to staging

on:
  push:
    branches: [ main ]

jobs:
  redeploy_everything:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key ubuntu@3.111.198.37 << 'EOF'
          cd devops-test/ && git pull
          bun install
          bun run build
          pm2 restart fe-server
          pm2 restart http-server
          pm2 restart ws-server
          EOF